site_name: arch-line-weights
site_description: Apply architectural line-weight hierarchy to Rhino-exported vector drawings.
site_url: https://zohartito.github.io/arch-line-weights/
site_author: zohartito
copyright: Copyright &copy; 2026 zohartito — MIT License

repo_name: zohartito/arch-line-weights
repo_url: https://github.com/zohartito/arch-line-weights
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zohartito/arch-line-weights
  generator: false

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.smartsymbols

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            docstring_style: google
            members_order: source
            filters: ["!^_"]

nav:
  - Home: index.md
  - Tutorials:
      - tutorials/your-first-section-drawing.md
  - How-to:
      - Apply line weights: how-to/apply-line-weights.md
      - Supported inputs: how-to/supported-inputs.md
      - Generate poché: how-to/generate-poche.md
      - Material hatching: how-to/material-hatching.md
      - Use with Rhino: how-to/use-with-rhino.md
      - Troubleshoot: how-to/troubleshoot.md
  - Reference:
      - CLI: reference/cli.md
      - Python API: reference/python-api.md
  - Explanation:
      - How poché works: explanation/how-poche-works.md
      - Why this tool exists: explanation/why-this-tool-exists.md
      - Postmortem: explanation/the-postmortem.md
