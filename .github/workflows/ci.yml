name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_matrix:
        description: "Run the slower OS/Python compatibility matrix"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on ubuntu-latest / Python 3.12
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run pytest
        run: pytest -v --tb=short --ignore=tests/test_hatch_v05.py

  compatibility:
    name: Compatibility on ${{ matrix.os }} / Python ${{ matrix.python }}
    if: github.event_name == 'workflow_dispatch' && inputs.full_matrix == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run pytest
        run: pytest -v --tb=short --ignore=tests/test_hatch_v05.py

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff>=0.7
      - name: ruff check
        run: ruff check src/ tests/
      - name: ruff format check
        run: ruff format --check src/ tests/
        continue-on-error: true  # don't fail CI on formatting alone for now
